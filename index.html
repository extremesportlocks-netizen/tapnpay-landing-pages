<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapNPay+ Landing Pages</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0A0518; color: #fff;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .hub { text-align: center; }
  .hub h1 { font-size: 28px; margin-bottom: 8px; }
  .hub p { color: rgba(255,255,255,0.4); margin-bottom: 36px; font-size: 14px; }
  .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .links a {
    display: block; padding: 20px 36px; border-radius: 12px;
    text-decoration: none; color: #fff; font-weight: 600; font-size: 15px;
    transition: all 0.3s; border: 1px solid rgba(255,255,255,0.1);
  }
  .links a:first-child { background: rgba(139, 92, 246, 0.15); border-color: rgba(139, 92, 246, 0.25); }
  .links a:first-child:hover { background: rgba(139, 92, 246, 0.25); transform: translateY(-3px); }
  .links a:last-child { background: rgba(16, 185, 129, 0.12); border-color: rgba(16, 185, 129, 0.2); }
  .links a:last-child:hover { background: rgba(16, 185, 129, 0.22); transform: translateY(-3px); }
  .links small { display: block; margin-top: 6px; font-size: 12px; color: rgba(255,255,255,0.35); font-weight: 400; }
</style>
</head>
<body>
<div class="hub">
  <h1>TapNPay+ Landing Pages</h1>
  <p>Preview builds — Power Marketing Company</p>
  <div class="links">
    <a href="/nil">College NIL Page<small>/nil</small></a>
    <a href="/impact">High School Impact Page<small>/impact</small></a>
  </div>
</div>
</body>
</html>
