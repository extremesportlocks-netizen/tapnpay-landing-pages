<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapNPay+ | Promo Code Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--purple-deep:#1A0A3E;--purple-bright:#8B5CF6;--purple-glow:#A78BFA;--green-neon:#00E676;--green-dark:#16A34A;--dark:#06020F;--dark-card:#0E0822;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--dark);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 30%,rgba(109,40,217,0.15),transparent 60%),radial-gradient(ellipse 40% 40% at 80% 80%,rgba(0,230,118,0.05),transparent 50%);pointer-events:none;}

.container{position:relative;z-index:1;width:100%;max-width:440px;padding:0 24px;}

/* LOGO */
.logo{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;text-align:center;margin-bottom:8px;}
.logo span{color:var(--green-neon);}
.subtitle{text-align:center;font-size:13px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:3px;margin-bottom:40px;}

/* CARD */
.card{background:rgba(14,8,34,0.5);backdrop-filter:blur(20px);border:1px solid rgba(139,92,246,0.12);border-radius:24px;padding:40px 32px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(139,92,246,0.3),transparent);}

.card-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;text-align:center;margin-bottom:24px;color:rgba(255,255,255,0.8);}

/* FORM */
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.4);margin-bottom:6px;}
.field input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 16px;color:#fff;font-family:'Outfit',sans-serif;font-size:15px;outline:none;transition:all 0.3s;}
.field input:focus{border-color:rgba(139,92,246,0.4);background:rgba(139,92,246,0.06);box-shadow:0 0 20px rgba(139,92,246,0.08);}
.field input::placeholder{color:rgba(255,255,255,0.2);}

/* CODE INPUT */
.code-input{font-family:'Bebas Neue',sans-serif!important;font-size:32px!important;letter-spacing:6px!important;text-align:center;text-transform:uppercase;color:var(--green-neon)!important;background:rgba(0,230,118,0.04)!important;border:2px solid rgba(0,230,118,0.2)!important;padding:20px 16px!important;}
.code-input:focus{border-color:rgba(0,230,118,0.4)!important;box-shadow:0 0 30px rgba(0,230,118,0.1)!important;}

/* BUTTON */
.btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--green-neon),#00C853);color:var(--dark);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;transition:all 0.4s;margin-top:8px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,230,118,0.25);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);font-size:14px;margin-top:16px;}
.btn-logout:hover{border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);box-shadow:none;}

/* STATUS */
.status{text-align:center;margin-top:16px;font-size:13px;font-weight:600;min-height:20px;transition:all 0.3s;}
.status.success{color:var(--green-neon);}
.status.error{color:#EF4444;}
.status.loading{color:var(--purple-glow);}

/* CURRENT CODE DISPLAY */
.current{text-align:center;margin-bottom:24px;padding:16px;border-radius:14px;background:rgba(0,230,118,0.03);border:1px solid rgba(0,230,118,0.1);}
.current-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.35);margin-bottom:8px;}
.current-code{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:8px;color:var(--green-neon);text-shadow:0 0 30px rgba(0,230,118,0.2);}
.current-updated{font-size:11px;color:rgba(255,255,255,0.25);margin-top:6px;}

/* PAGES LIST */
.pages{margin-top:20px;padding-top:16px;border-top:1px solid rgba(139,92,246,0.08);}
.pages-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.25);margin-bottom:10px;}
.page-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;color:rgba(255,255,255,0.4);}
.page-dot{width:6px;height:6px;border-radius:50%;background:var(--green-neon);box-shadow:0 0 8px rgba(0,230,118,0.4);}

/* HIDDEN */
.hidden{display:none;}

@media(max-width:480px){
  .card{padding:32px 24px;}
  .current-code{font-size:32px;letter-spacing:6px;}
  .code-input{font-size:26px!important;letter-spacing:4px!important;}
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">TAPNPAY<span>+</span></div>
  <div class="subtitle">Promo Code Admin</div>

  <!-- LOGIN -->
  <div class="card" id="login-card">
    <div class="card-title">SIGN IN</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" onclick="login()">SIGN IN</button>
    <div class="status" id="login-status"></div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="card hidden" id="admin-card">
    <div class="card-title">PROMO CODE MANAGER</div>

    <div class="current">
      <div class="current-label">Current Code — Live on All Pages</div>
      <div class="current-code" id="display-code">...</div>
      <div class="current-updated" id="display-updated"></div>
    </div>

    <div class="field">
      <label>New Promo Code</label>
      <input type="text" class="code-input" id="new-code" placeholder="ENTER CODE" maxlength="30" oninput="this.value=this.value.toUpperCase()">
    </div>

    <button class="btn" id="save-btn" onclick="saveCode()">UPDATE CODE ON ALL PAGES</button>
    <div class="status" id="save-status"></div>

    <div class="pages">
      <div class="pages-title">Pushes to:</div>
      <div class="page-item"><span class="page-dot"></span> nil.tapnpayplus.com</div>
      <div class="page-item"><span class="page-dot"></span> athletes.tapnpayplus.com</div>
      <div class="page-item"><span class="page-dot"></span> fans.tapnpayplus.com</div>
    </div>

    <button class="btn btn-logout" onclick="logout()">SIGN OUT</button>
  </div>
</div>

<script>
var session = null;

function login() {
  var email = document.getElementById('login-email').value.trim();
  var pass = document.getElementById('login-password').value;
  var status = document.getElementById('login-status');

  if (!email || !pass) { status.className='status error'; status.textContent='Enter email and password.'; return; }

  status.className='status loading'; status.textContent='Signing in...';

  // Simple client-side auth check (matches server-side)
  if (email.toLowerCase() === 'colton@powermarketing.com' && pass === 'Tapnpay2026!') {
    session = { email: email, password: pass };
    status.className='status success'; status.textContent='Welcome!';
    setTimeout(function(){ showAdmin(); }, 500);
  } else {
    status.className='status error'; status.textContent='Invalid credentials.';
  }
}

function showAdmin() {
  document.getElementById('login-card').classList.add('hidden');
  document.getElementById('admin-card').classList.remove('hidden');
  loadCurrentCode();
}

function logout() {
  session = null;
  document.getElementById('admin-card').classList.add('hidden');
  document.getElementById('login-card').classList.remove('hidden');
  document.getElementById('login-password').value = '';
  document.getElementById('login-status').textContent = '';
}

function loadCurrentCode() {
  fetch('/promo-code.json?t=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(data){
      document.getElementById('display-code').textContent = data.code || '—';
      if (data.updated) {
        var d = new Date(data.updated);
        document.getElementById('display-updated').textContent = 'Last updated: ' + d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
      }
    })
    .catch(function(){ document.getElementById('display-code').textContent = '—'; });
}

function saveCode() {
  var code = document.getElementById('new-code').value.trim();
  var btn = document.getElementById('save-btn');
  var status = document.getElementById('save-status');

  if (!code || code.length < 2) { status.className='status error'; status.textContent='Enter a valid code (2+ characters).'; return; }
  if (!session) { status.className='status error'; status.textContent='Not authenticated.'; return; }

  btn.disabled = true;
  btn.textContent = 'UPDATING...';
  status.className='status loading'; status.textContent='Pushing to all pages...';

  fetch('/api/update-code', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: session.email, password: session.password, code: code })
  })
  .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, data:d}; }); })
  .then(function(result){
    if (result.ok && result.data.success) {
      status.className='status success';
      status.textContent = 'Code updated to ' + result.data.code + '! Pages update in 2-3 minutes.';
      document.getElementById('display-code').textContent = result.data.code;
      document.getElementById('display-updated').textContent = 'Last updated: just now';
      document.getElementById('new-code').value = '';
    } else {
      status.className='status error';
      status.textContent = result.data.error || 'Update failed. Try again.';
    }
    btn.disabled = false;
    btn.textContent = 'UPDATE CODE ON ALL PAGES';
  })
  .catch(function(err){
    status.className='status error';
    status.textContent = 'Network error. Try again.';
    btn.disabled = false;
    btn.textContent = 'UPDATE CODE ON ALL PAGES';
  });
}

// Enter key support
document.getElementById('login-password').addEventListener('keydown', function(e){ if(e.key==='Enter') login(); });
document.getElementById('new-code').addEventListener('keydown', function(e){ if(e.key==='Enter') saveCode(); });
</script>
</body>
</html>
